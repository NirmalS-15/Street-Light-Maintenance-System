{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report a Street Light Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <style>
        :root {
            --primary: #0d6efd;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --glow: #ffeb3b;
        }
        body {
            background: linear-gradient(135deg, #16213e, #0f3460);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow-x: hidden;
        }

        .street-light {
            position: absolute;
            width: 70px;
            height: 200px;
            bottom: 0;
            z-index: 1;
            animation: pulse-glow 2s ease-in-out infinite alternate;
        }
        .street-light-left { left: 5%; animation-delay: 0.4s; }
        .street-light-right { right: 5%; animation-delay: 0s; }

        .pole { background: #333; width: 7px; height: 150px; margin: 0 auto; }
        .bulb {
            width: 35px; height: 35px;
            background: radial-gradient(circle, #fff 10%, var(--glow) 40%, #ff9800 100%);
            border-radius: 50%;
            margin: 0 auto;
            box-shadow: 0 0 50px var(--glow), 0 0 90px #ff9800;
        }
        .lamp-arm { width: 28px; height: 5px; background: #444; margin: -8px auto 0; border-radius: 3px; }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 50px var(--glow), 0 0 90px #ff9800; transform: scale(1); }
            to { box-shadow: 0 0 80px var(--glow), 0 0 140px #ff9800; transform: scale(1.05); }
        }

        .report-card {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 2;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--glow);
            box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.25);
            color: white;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.6); }

        .form-select option {
            background: #16213e;
            color: white;
        }

        .btn-submit {
            background: linear-gradient(135deg, #ffc107, #ff8c00);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 14px;
            border-radius: 12px;
            transition: all 0.3s;
            width: 100%;
            font-size: 1.1rem;
        }
        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 193, 7, 0.4);
        }

        .night-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #0a1a3a 0%, #1e3a6e 100%);
            z-index: 0;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* LOGOUT BUTTON STYLES */
        .logout-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logout-btn {
            background: linear-gradient(135deg, #ff6b6b, #ee5a52);
            border: none;
            color: white;
            font-size: 0.9rem;
            padding: 6px 16px;
            border-radius: 50px;
            transition: all 0.3s;
        }
        .logout-btn:hover {
            background: linear-gradient(135deg, #ee5a52, #d32f2f);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <!-- Night Sky -->
    <div class="night-bg">
        <div class="star" style="top:10%;left:15%;width:2px;height:2px;animation-delay:0.5s;"></div>
        <div class="star" style="top:25%;left:70%;width:3px;height:3px;animation-delay:1.2s;"></div>
        <div class="star" style="top:40%;left:30%;width:2px;height:2px;animation-delay:0.8s;"></div>
        <div class="star" style="top:60%;left:80%;width:3px;height:3px;animation-delay:2s;"></div>
        <div class="star" style="top:75%;left:45%;width:2px;height:2px;animation-delay:1.5s;"></div>
    </div>

    <!-- Street Lights -->
    <div class="street-light street-light-left">
        <div class="lamp-arm"></div>
        <div class="bulb"></div>
        <div class="pole"></div>
    </div>
    <div class="street-light street-light-right">
        <div class="lamp-arm"></div>
        <div class="bulb"></div>
        <div class="pole"></div>
    </div>

    <!-- LOGOUT BUTTON + USERNAME -->
    {% if user.is_authenticated %}
    <div class="logout-container">
        <span style="font-weight:600;">Hi, <strong>{{ user.username }}</strong></span>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
    {% endif %}

    <!-- Report Form -->
    <div class="container">
        <div class="report-card mx-auto" data-aos="zoom-in">
            <h2 class="text-center mb-4" data-aos="fade-up">
                Report Street Light Issue
            </h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success text-center mb-4" data-aos="fade-up">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3" data-aos="fade-up" data-aos-delay="100">
                    <label class="form-label">Type <span class="text-danger">*</span></label>
                    <select name="type" class="form-select" required>
                        <option value="">Select Type</option>
                        <option value="Normal">Normal</option>
                        <option value="Urgent">Urgent</option>
                    </select>
                </div>

                <div class="mb-3" data-aos="fade-up" data-aos-delay="200">
                    <label class="form-label">District <span class="text-danger">*</span></label>
                    <select name="district" class="form-select" required>
                        <option value="">Select District</option>
                        <option value="Alappuzha">Alappuzha</option>
                        <option value="Ernakulam">Ernakulam</option>
                        <option value="Idukki">Idukki</option>
                        <option value="Kannur">Kannur</option>
                        <option value="Kasaragod">Kasaragod</option>
                        <option value="Kollam">Kollam</option>
                        <option value="Kottayam">Kottayam</option>
                        <option value="Kozhikode">Kozhikode</option>
                        <option value="Malappuram">Malappuram</option>
                        <option value="Palakkad">Palakkad</option>
                        <option value="Pathanamthitta">Pathanamthitta</option>
                        <option value="Thiruvananthapuram">Thiruvananthapuram</option>
                        <option value="Thrissur">Thrissur</option>
                        <option value="Wayanad">Wayanad</option>
                    </select>
                </div>

                <div class="mb-3" data-aos="fade-up" data-aos-delay="300">
                    <label class="form-label">Place <span class="text-danger">*</span></label>
                    <input type="text" name="place" class="form-control" placeholder="e.g. Marine Drive" required>
                </div>

                <div class="mb-3" data-aos="fade-up" data-aos-delay="400">
                    <label class="form-label">Location (Landmark) <span class="text-danger">*</span></label>
                    <input type="text" name="location" class="form-control" placeholder="e.g. Near ABC Tower" required>
                </div>

                <div class="mb-3" data-aos="fade-up" data-aos-delay="500">
                    <label class="form-label">Issue <span class="text-danger">*</span></label>
                    <input type="text" name="issue" class="form-control" placeholder="e.g. Light not working" required>
                </div>

                <div class="mb-3" data-aos="fade-up" data-aos-delay="600">
                    <label class="form-label">Description (Optional)</label>
                    <textarea name="description" class="form-control" rows="3" placeholder="Additional details..."></textarea>
                </div>

                <div class="mb-3" data-aos="fade-up" data-aos-delay="700">
                    <label class="form-label">Phone Number <span class="text-danger">*</span></label>
                    <input type="tel" name="phone" class="form-control" placeholder="e.g. 9876543210" required>
                </div>

                <div class="mb-3" data-aos="fade-up" data-aos-delay="800">
                    <label class="form-label">Upload Photo (Optional)</label>
                    <input type="file" name="photo" class="form-control" accept="image/*">
                </div>

                <button type="submit" class="btn btn-submit" data-aos="zoom-in" data-aos-delay="900">
                    Submit Complaint
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'complaints:my_complaints' %}" class="text-light" style="font-size: 0.9rem;">
                    View My Complaints
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
