{% extends 'base.html' %}
{% block content %}
{% if user.is_authenticated and user.is_staff %}
<h2>Admin: Manage Complaints</h2>
<table class="table">
    <thead>
        <tr>
            <th>User</th>
            <th>Issue</th>
            <th>Type</th>
            <th>Status</th>
            <th>Created At</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="adminComplaintTable">
        <!-- Populated by JavaScript -->
    </tbody>
</table>
{% else %}
<p>Please <a href="{% url 'login' %}">login</a> as an admin to manage complaints.</p>
{% endif %}
{% endblock %}
