{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSEB Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #0f3460, #16213e);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            max-width: 400px;
            background: rgba(255,255,255,.08);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 15px 35px rgba(0,0,0,.3);
        }
        .btn-kseb {
            background: linear-gradient(135deg, #ff8c00, #ffc107);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
        }
        .btn-kseb:hover {
            background: linear-gradient(135deg, #ffb300, #ffca28);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,193,7,.6);
        }
        .form-control {
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.2);
            color: white;
        }
        .form-control::placeholder {
            color: rgba(255,255,255,.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card mx-auto" data-aos="zoom-in">
            <div class="text-center mb-4">
                <h3>KSEB Admin Login</h3>
            </div>

            {% if messages %}
                {% for msg in messages %}
                    <div class="alert alert-{{ msg.tags }} alert-dismissible fade show">
                        {{ msg }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-kseb">Login</button>
            </form>

            <div class="text-center mt-3">
                <a href="{% url 'auth' %}" class="text-light text-decoration-none">Back to Main Login</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
